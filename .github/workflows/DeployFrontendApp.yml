name: Simple Frontend Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3️⃣ Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 545009838877.dkr.ecr.ap-south-1.amazonaws.com

      # 4️⃣ Build & Push Docker Image
      - name: Build & Push
        run: |
          docker build -f frontend/Dockerfile -t github-ecr frontend
          docker tag github-ecr:latest 545009838877.dkr.ecr.ap-south-1.amazonaws.com/github-ecr:latest
          docker push 545009838877.dkr.ecr.ap-south-1.amazonaws.com/github-ecr:latest
